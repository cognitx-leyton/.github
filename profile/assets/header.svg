<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f"/>
      <stop offset="50%" style="stop-color:#112240"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e8bc0"/>
      <stop offset="100%" style="stop-color:#6C63FF"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e8bc0;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.15"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e8bc0;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0.08"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(46,139,192,0.06)" stroke-width="0.5"/>
  </pattern>
  <rect width="900" height="300" fill="url(#grid)"/>

  <!-- Decorative wave bottom -->
  <path d="M0,260 C150,230 350,290 500,260 C650,230 800,270 900,250 L900,300 L0,300 Z" fill="url(#wave1)"/>
  <path d="M0,270 C200,250 400,300 600,270 C750,250 850,280 900,265 L900,300 L0,300 Z" fill="url(#wave2)"/>

  <!-- Decorative circles -->
  <circle cx="780" cy="60" r="80" fill="none" stroke="rgba(46,139,192,0.08)" stroke-width="1"/>
  <circle cx="780" cy="60" r="120" fill="none" stroke="rgba(108,99,255,0.05)" stroke-width="1"/>
  <circle cx="120" cy="240" r="60" fill="none" stroke="rgba(46,139,192,0.06)" stroke-width="1"/>

  <!-- Accent line -->
  <rect x="350" y="170" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>

  <!-- LEYTON text -->
  <text x="450" y="110" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="18" font-weight="300" letter-spacing="12" text-anchor="middle" fill="#a8b2d1">LEYTON</text>

  <!-- CognitX main text -->
  <text x="450" y="155" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="52" font-weight="700" text-anchor="middle" fill="#e6f1ff">CognitX</text>

  <!-- Tagline -->
  <text x="450" y="200" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="16" font-weight="400" text-anchor="middle" fill="#8892b0">AI &amp; Technology Advisory</text>

  <!-- Bottom stats -->
  <text x="250" y="250" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2e8bc0">200+</text>
  <text x="250" y="268" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="10" font-weight="400" text-anchor="middle" fill="#5a6a8a">Tech Builders</text>

  <text x="450" y="250" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2e8bc0">17</text>
  <text x="450" y="268" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="10" font-weight="400" text-anchor="middle" fill="#5a6a8a">Countries</text>

  <text x="650" y="250" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2e8bc0">120+</text>
  <text x="650" y="268" font-family="Segoe UI, Arial, Helvetica, sans-serif" font-size="10" font-weight="400" text-anchor="middle" fill="#5a6a8a">Tech Projects</text>

  <!-- Small dot separators for stats -->
  <circle cx="350" cy="258" r="2" fill="#2e8bc0" opacity="0.4"/>
  <circle cx="550" cy="258" r="2" fill="#2e8bc0" opacity="0.4"/>
</svg>
